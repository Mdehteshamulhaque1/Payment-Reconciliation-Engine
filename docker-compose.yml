version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - 8000:8000
    env_file:
      - ./backend/.env
  frontend:
    build: ./frontend
    ports:
      - 3000:3000
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: example
    ports:
      - 3306:3306
  redis:
    image: redis:7
    ports:
      - 6379:6379
